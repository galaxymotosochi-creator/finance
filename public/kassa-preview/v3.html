<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Касса • Вариант 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
body{background:#f5f5f7;padding:20px}
.phone{max-width:834px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 4px 40px rgba(0,0,0,.08);overflow:hidden;height:900px;display:flex;flex-direction:column}
.top{background:#000;padding:8px 16px;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:10px;font-weight:700;letter-spacing:.04em}
.body{flex:1;display:flex;overflow:hidden}
.left{width:320px;min-width:320px;display:flex;flex-direction:column;background:#fafafa;border-right:1px solid #f0f0f0}
.right{flex:1;display:flex;flex-direction:column;padding:14px}
.total{background:#ffdd2d;margin-top:auto;padding:14px;gap:8px;display:flex;flex-direction:column}
.chk-hdr{font-size:11px;font-weight:700;padding:14px 14px 10px;display:flex;justify-content:space-between;color:#000;letter-spacing:.04em}
.items{flex:1;overflow-y:auto;padding:0 6px}
.item{display:flex;align-items:center;gap:8px;padding:10px 8px;border-bottom:1px solid #f0f0f0}
.item .name{flex:1;font-size:13px;font-weight:500}
.item .qty{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.item .qty button{width:26px;height:26px;border-radius:6px;border:none;background:#f0f0f0;font-size:14px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center}
.item .sum{font-size:13px;font-weight:700;min-width:70px;text-align:right}
.srch{display:flex;gap:8px;margin-bottom:10px}
.srch input{flex:1;border:none;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;background:#f5f5f7}
.grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{border:none;border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .15s;background:#f9f9f9;display:flex;flex-direction:column;gap:4px}
.card:hover{background:#f0f0f0}
.card .n{font-size:13px;font-weight:600}
.card .p{font-size:16px;font-weight:800;color:#000;margin-top:4px}
.card .u{font-size:10px;color:#999}
.tabs{display:flex;gap:4px;margin-bottom:10px;width:fit-content}
.tabs button{padding:6px 16px;border-radius:100px;border:1.5px solid #e0e0e0;font-size:12px;font-weight:500;background:transparent;color:#666;cursor:pointer;font-family:inherit}
.tabs button.active{background:#000;color:#fff;border-color:#000;font-weight:600}
.pay-btn{flex:1;padding:12px;border-radius:100px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;background:#f0f0f0;color:#555}
.pay-btn.active{background:#000;color:#fff}
.sell-btn{width:100%;padding:14px;border-radius:100px;border:none;background:#000;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.sell-btn:disabled{opacity:.3}
.tag{font-size:10px;color:#000;background:#ffdd2d;padding:2px 8px;border-radius:100px;display:inline-block;width:fit-content}
.total-price{font-size:22px;font-weight:800}
</style>
</head><body>
<div class="phone">
<div class="top"><span class="dot" style="background:#ff6052"/><span class="dot" style="background:#ffbd2e"/><span class="dot" style="background:#28c93f"/><span style="margin-left:6px;flex:1">KASSA · ВАРИАНТ 3</span><span style="font-weight:400;font-size:9px;opacity:.5">Жёлтый итог</span></div>
<div class="body">
<div class="left">
<div class="chk-hdr"><span>ЧЕК</span><span style="color:#999;font-weight:500">3 позиции</span></div>
<div class="items">
<div class="item"><div class="name">Скутер Tank X</div><div class="qty"><button>-</button><span>1</span><button>+</button></div><div class="sum">149 900</div></div>
<div class="item"><div class="name">Масло моторное</div><div class="qty"><button>-</button><span>2</span><button>+</button></div><div class="sum">5 000</div></div>
<div class="item"><div class="name">Шлем открытый</div><div class="qty"><button>-</button><span>1</span><button>+</button></div><div class="sum">7 500</div></div>
</div>
<div class="total">
<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:13px;color:#000;font-weight:600">ИТОГО</span><span class="total-price">162 400</span></div>
<div style="display:flex;gap:8px"><div class="pay-btn active">💵 Наличные</div><div class="pay-btn">💳 Карта</div></div>
<button class="sell-btn">Оплатить</button>
</div>
</div>
<div class="right">
<div class="tabs"><button class="active">Товары</button><button>Услуги</button><button>Все</button></div>
<div class="srch"><input placeholder="🔍 Поиск товаров и услуг..."/></div>
<div class="grid">
<div class="card"><div class="n">Скутер Tank X</div><div class="p">149 900 ₽</div><div class="tag">хит</div></div>
<div class="card"><div class="n">Скутер Tank Next</div><div class="p">72 900 ₽</div><div class="u">б/у</div></div>
<div class="card"><div class="n">Масло моторное</div><div class="p">2 500 ₽</div></div>
<div class="card"><div class="n">Шлем открытый</div><div class="p">7 500 ₽</div><div class="tag">new</div></div>
<div class="card"><div class="n">Аккумулятор</div><div class="p">3 500 ₽</div></div>
<div class="card"><div class="n">Колодки тормозные</div><div class="p">1 200 ₽</div></div>
</div>
</div>
</div>
</div>
</body></html>
