<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AtlasPos — авторизация</title>
</head>
<body>
  <script>
    // Перенаправляем на Supabase для обработки
    var hash = window.location.hash.substring(1);
    var search = window.location.search.substring(1);
    var params = hash || search;
    if (params) {
      var target = 'https://fqnmkynxuaxaljokptwn.supabase.co/auth/v1/callback';
      if (hash) target += '#' + hash;
      else if (search) target += '?' + search;
      window.location.replace(target);
    }
  </script>
  <p>Авторизация...</p>
</body>
</html>
