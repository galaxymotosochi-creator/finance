name: Deploy to VPS

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 194.226.163.4
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/opt/atlaspos-site/"
          strip_components: 1
      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.226.163.4
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod -R 755 /opt/atlaspos-site/
            systemctl reload nginx || true
